kind = "mobile"
previewPath = "/mobile/"
title = "Autonomous Revenue OS Mobile"
version = "1.0.0"
id = "artifacts/living-codex-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 8082

[services.development]
run = "pnpm --filter @workspace/living-codex-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/living-codex-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/living-codex-mobile", "run", "serve" ]

[services.env]
PORT = "8082"
BASE_PATH = "/mobile/"
